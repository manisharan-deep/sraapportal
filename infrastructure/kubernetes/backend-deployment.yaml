apiVersion: apps/v1
kind: Deployment
metadata:
  name: sru-portal-backend
  labels:
    app: sru-portal-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sru-portal-backend
  template:
    metadata:
      labels:
        app: sru-portal-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/sru-portal-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: sru-portal-config
            - secretRef:
                name: sru-portal-secret
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
