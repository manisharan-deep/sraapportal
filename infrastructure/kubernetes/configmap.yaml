apiVersion: v1
kind: ConfigMap
metadata:
  name: sru-portal-config
data:
  NODE_ENV: "production"
  PORT: "3000"
  BASE_URL: "https://portal.sru.local"
  MONGO_URI: "mongodb://mongodb.default.svc.cluster.local:27017/sru_portal"
  REDIS_HOST: "redis.default.svc.cluster.local"
  REDIS_PORT: "6379"
  JWT_ACCESS_EXPIRES: "15m"
  JWT_REFRESH_EXPIRES: "7d"
  CORS_ORIGIN: "https://portal.sru.local"
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  EMAIL_FROM: "no-reply@sru.local"
  WHATSAPP_API_URL: "https://api.example.com/whatsapp"
