# Local CI pipeline for self-hosted runner
name: Local CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-test-deploy:
    runs-on: self-hosted

    steps:
      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # Ensure Node.js is available
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # Start database services for integration tests
      - name: Start database services
        run: docker compose -f docker/docker-compose.yml up -d postgres mongo

      # Install backend dependencies
      - name: Install backend deps
        working-directory: backend
        run: npm install

      # Run backend integration tests
      - name: Test backend
        working-directory: backend
        run: npm run test:integration

      # Install frontend dependencies
      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      # Run frontend tests
      - name: Test frontend
        working-directory: frontend
        run: npm test

      # Build Docker images
      - name: Build backend image
        run: docker build -f docker/Dockerfile.backend -t devops-task-manager-backend:ci .

      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t devops-task-manager-frontend:ci .

      # Login to Docker Hub
      - name: Docker login
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      # Push images to Docker Hub
      - name: Push backend image
        run: |
          docker tag devops-task-manager-backend:ci ${{ secrets.DOCKERHUB_USERNAME }}/devops-task-manager-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devops-task-manager-backend:latest

      - name: Push frontend image
        run: |
          docker tag devops-task-manager-frontend:ci ${{ secrets.DOCKERHUB_USERNAME }}/devops-task-manager-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devops-task-manager-frontend:latest

      # Deploy to Minikube
      - name: Deploy to Minikube
        run: scripts/deploy-minikube.sh

      # Verify rollout
      - name: Verify rollout
        run: kubectl -n local-devops get pods
