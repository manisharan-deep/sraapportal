<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - SR University Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen text-slate-100">
  <div class="page-bg"></div>
  <main class="relative z-10 grid min-h-screen place-items-center px-6 py-10">
    <section class="w-full max-w-xl rounded-3xl border border-white/10 bg-white/10 p-7 shadow-2xl backdrop-blur-xl sm:p-8 fade-in-up">
      <div class="mb-6">
        <p class="text-xs font-semibold uppercase tracking-[0.2em] text-emerald-200">Create Account</p>
        <h1 class="mt-2 text-2xl font-bold text-white">Join SR University Portal</h1>
      </div>
      <div id="errorAlert" class="d-none rounded-xl border border-rose-300/40 bg-rose-400/20 px-3 py-2 text-sm text-rose-100"></div>
      <div id="successAlert" class="d-none rounded-xl border border-emerald-300/40 bg-emerald-400/20 px-3 py-2 text-sm text-emerald-100"></div>
      <form id="registerForm" class="mt-4 space-y-4">
        <div>
          <label class="mb-1 block text-sm font-medium text-slate-200">Full Name</label>
          <input type="text" class="input-tailwind" id="fullName" required>
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium text-slate-200">Email</label>
          <input type="email" class="input-tailwind" id="email" required>
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium text-slate-200">Role</label>
          <select class="input-tailwind" id="role" required>
                  <option value="STUDENT">Student</option>
                  <option value="STAFF">Staff</option>
          </select>
        </div>
        <div id="enrollmentGroup">
          <label class="mb-1 block text-sm font-medium text-slate-200">Enrollment Number</label>
          <input type="text" class="input-tailwind" id="enrollmentNumber">
        </div>
        <div class="d-none" id="usernameGroup">
          <label class="mb-1 block text-sm font-medium text-slate-200">Username</label>
          <input type="text" class="input-tailwind" id="username">
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium text-slate-200">Password</label>
          <input type="password" class="input-tailwind" id="password" required minlength="8">
          <div class="mt-2 flex items-center gap-2">
            <button type="button" id="suggestPasswordBtn" class="btn-secondary-tailwind text-xs px-3 py-1.5">Suggest Strong Password</button>
            <span id="passwordStrength" class="text-xs text-slate-300">Strength: -</span>
          </div>
          <p id="suggestedPasswordText" class="mt-2 text-xs text-cyan-200 d-none"></p>
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium text-slate-200">Confirm Password</label>
          <input type="password" class="input-tailwind" id="confirmPassword" required>
        </div>
        <button type="submit" class="btn-primary-tailwind w-full">Register</button>
      </form>
      <p class="mt-5 text-center text-sm text-slate-300">Already have an account? <a href="login.html" class="font-semibold text-cyan-200 hover:text-cyan-100">Login</a></p>
      <p class="mt-3 text-center text-xs text-slate-400"><a href="index.html" class="hover:text-slate-200">Back to home</a></p>
    </section>
  </main>
  <script src="js/config.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
