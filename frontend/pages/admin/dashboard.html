<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - SR University Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="min-h-screen text-slate-100">
  <div class="page-bg"></div>
  <header class="relative z-10 border-b border-white/10 bg-slate-950/30 backdrop-blur-xl">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4 lg:px-8">
      <a class="text-sm font-semibold uppercase tracking-[0.22em] text-cyan-200" href="../../index.html">SR University Portal</a>
      <div class="flex items-center gap-4">
        <span class="text-sm text-slate-200">Welcome, <span id="userName" class="font-semibold text-white"></span></span>
        <button class="btn-secondary-tailwind px-4 py-2 text-sm" id="logoutBtn">Logout</button>
      </div>
    </div>
  </header>

  <main class="relative z-10 mx-auto max-w-7xl px-6 py-8 lg:px-8">
    <h1 class="text-2xl font-bold text-white">Admin Dashboard</h1>

    <section class="mt-6 space-y-4">
      <article class="panel-card">
        <h2 class="text-lg font-semibold text-white">Pending Profile Approvals</h2>
        <div id="pendingApprovals" class="mt-3 space-y-2">
          <p class="text-sm text-slate-400">Loading...</p>
        </div>
      </article>
      <article class="panel-card">
        <h2 class="text-lg font-semibold text-white">System Users</h2>
        <div id="usersList" class="mt-3 space-y-2">
          <p class="text-sm text-slate-400">Loading...</p>
        </div>
      </article>
    </section>
  </main>

  <script src="../../js/config.js"></script>
  <script src="../../js/admin-dashboard.js"></script>
</body>
</html>
