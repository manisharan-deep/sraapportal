services:
  # ── Managed Redis (free tier) ──────────────────────────────────────────────
  - type: redis
    name: sraap-redis
    plan: free
    maxmemoryPolicy: noeviction

  # ── Web service ────────────────────────────────────────────────────────────
  - type: web
    name: sraap-portal
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is injected automatically by Render (10000); do NOT override it.
      - key: BASE_URL
        sync: false          # Set to your Render URL after first deploy, e.g. https://sraap-portal.onrender.com
      - key: CORS_ORIGIN
        sync: false          # Same value as BASE_URL

      # ── Database ────────────────────────────────────────────────────────────
      - key: MONGO_URI
        sync: false          # Paste your MongoDB Atlas connection string here

      # ── Redis (linked to the managed service above) ─────────────────────────
      - key: REDIS_HOST
        fromService:
          type: redis
          name: sraap-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: sraap-redis
          property: port

      # ── Secrets (auto-generated by Render on first deploy) ──────────────────
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true

      # ── Email (optional) ────────────────────────────────────────────────────
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 2525
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: no-reply@sru-portal.local

      # ── WhatsApp (optional) ─────────────────────────────────────────────────
      - key: WHATSAPP_API_URL
        sync: false
      - key: WHATSAPP_API_KEY
        sync: false

      # ── Admin seed ──────────────────────────────────────────────────────────
      - key: ADMIN_SEED_USERNAME
        value: admin
      - key: ADMIN_SEED_EMAIL
        value: admin@sru.local
      - key: ADMIN_SEED_PASSWORD
        sync: false          # Set a strong password in the Render dashboard
