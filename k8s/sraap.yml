# ==============================================================
# SRAAP Portal - Kubernetes Manifest (Single File)
# Includes: Namespace, Secrets, PVC (EBS), MongoDB, Redis, Backend, Frontend
# ==============================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: sraap
  labels:
    app.kubernetes.io/part-of: sraap

---
# Base64 examples:
# echo -n 'sraap_root' | base64
# echo -n 'change_me_root_password' | base64
# echo -n 'mongodb://sraap_root:change_me_root_password@sraap-mongodb:27017/sru_portal?authSource=admin' | base64
# echo -n 'change_me_access' | base64
# echo -n 'change_me_refresh' | base64
# echo -n 'change_me_session' | base64
apiVersion: v1
kind: Secret
metadata:
  name: sraap-app-secret
  namespace: sraap
  labels:
    app.kubernetes.io/part-of: sraap
type: Opaque
data:
  MONGO_ROOT_USERNAME: c3JhYXBfcm9vdA==
  MONGO_ROOT_PASSWORD: Y2hhbmdlX21lX3Jvb3RfcGFzc3dvcmQ=
  MONGO_URI: bW9uZ29kYjovL3NyYWFwX3Jvb3Q6Y2hhbmdlX21lX3Jvb3RfcGFzc3dvcmRAc3JhYXAtbW9uZ29kYjoyNzAxNy9zcnVfcG9ydGFsP2F1dGhTb3VyY2U9YWRtaW4=
  JWT_ACCESS_SECRET: Y2hhbmdlX21lX2FjY2Vzcw==
  JWT_REFRESH_SECRET: Y2hhbmdlX21lX3JlZnJlc2g=
  SESSION_SECRET: Y2hhbmdlX21lX3Nlc3Npb24=

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: sraap-ebs-sc
provisioner: ebs.csi.eks.amazonaws.com
parameters:
  type: gp3
  encrypted: "true"
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sraap-mongodb-pvc
  namespace: sraap
  labels:
    app.kubernetes.io/part-of: sraap
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: sraap-ebs-sc
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sraap-mongodb
  namespace: sraap
  labels:
    app.kubernetes.io/name: sraap-mongodb
    app.kubernetes.io/part-of: sraap
    app.kubernetes.io/component: database
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: sraap-mongodb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sraap-mongodb
        app.kubernetes.io/part-of: sraap
        app.kubernetes.io/component: database
    spec:
      automountServiceAccountToken: false
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
              protocol: TCP
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sraap-app-secret
                  key: MONGO_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sraap-app-secret
                  key: MONGO_ROOT_PASSWORD
          volumeMounts:
            - name: db-storage
              mountPath: /data/db
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - db.adminCommand('ping')
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - db.adminCommand('ping')
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: sraap-mongodb-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: sraap-mongodb
  namespace: sraap
  labels:
    app.kubernetes.io/name: sraap-mongodb
    app.kubernetes.io/part-of: sraap
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sraap-mongodb
  ports:
    - port: 27017
      targetPort: 27017
      protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sraap-redis
  namespace: sraap
  labels:
    app.kubernetes.io/name: sraap-redis
    app.kubernetes.io/part-of: sraap
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sraap-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sraap-redis
        app.kubernetes.io/part-of: sraap
        app.kubernetes.io/component: cache
    spec:
      automountServiceAccountToken: false
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  name: sraap-redis
  namespace: sraap
  labels:
    app.kubernetes.io/name: sraap-redis
    app.kubernetes.io/part-of: sraap
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sraap-redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sraap-backend
  namespace: sraap
  labels:
    app.kubernetes.io/name: sraap-backend
    app.kubernetes.io/part-of: sraap
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sraap-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sraap-backend
        app.kubernetes.io/part-of: sraap
        app.kubernetes.io/component: backend
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z sraap-mongodb 27017; do
                echo "MongoDB not ready, retrying..."
                sleep 3
              done
      containers:
        - name: backend
          image: ghcr.io/your-org/sru-portal-backend:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: sraap-app-secret
                  key: MONGO_URI
            - name: REDIS_HOST
              value: sraap-redis
            - name: REDIS_PORT
              value: "6379"
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: sraap-app-secret
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: sraap-app-secret
                  key: JWT_REFRESH_SECRET
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: sraap-app-secret
                  key: SESSION_SECRET
            - name: CORS_ORIGIN
              value: http://sraap-frontend
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 8
            periodSeconds: 5
            timeoutSeconds: 3

---
apiVersion: v1
kind: Service
metadata:
  name: sraap-backend
  namespace: sraap
  labels:
    app.kubernetes.io/name: sraap-backend
    app.kubernetes.io/part-of: sraap
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sraap-backend
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sraap-frontend
  namespace: sraap
  labels:
    app.kubernetes.io/name: sraap-frontend
    app.kubernetes.io/part-of: sraap
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sraap-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sraap-frontend
        app.kubernetes.io/part-of: sraap
        app.kubernetes.io/component: frontend
    spec:
      automountServiceAccountToken: false
      containers:
        - name: frontend
          image: ghcr.io/your-org/sru-portal-frontend:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 101
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: sraap-frontend
  namespace: sraap
  labels:
    app.kubernetes.io/name: sraap-frontend
    app.kubernetes.io/part-of: sraap
    app.kubernetes.io/component: frontend
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: sraap-frontend
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sraap-db-allow-backend-only
  namespace: sraap
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: sraap-mongodb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: sraap-backend
      ports:
        - port: 27017
          protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sraap-backend-allow-frontend-only
  namespace: sraap
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: sraap-backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: sraap-frontend
      ports:
        - port: 3000
          protocol: TCP
